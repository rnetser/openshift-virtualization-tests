name: Validate CodeRabbit Schema

on:
  pull_request_target:
    branches:
      - main
    paths:
      - '.coderabbit.yaml'

  workflow_dispatch:

jobs:
  validate-coderabbit-schema:
    name: Validate .coderabbit.yaml against schema
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Org members run automatically; outside contributors need maintainer approval
    environment: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && !contains(fromJSON('["COLLABORATOR","MEMBER","OWNER"]'), github.event.pull_request.author_association)) && 'external-pr-tests' || '' }}
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          allow-unsafe-pr-checkout: true
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Validate .coderabbit.yaml
        run: uvx check-jsonschema --schemafile "https://coderabbit.ai/integrations/schema.v2.json" .coderabbit.yaml
