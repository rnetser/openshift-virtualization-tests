# docs/site/ is auto-generated by docsfy (see AGENTS.md).
# Content is generated manually, committed directly to main (not via PRs),
# and this workflow deploys it to GitHub Pages.
name: Deploy Documentation Site

on:
  push:
    branches:
      - main
    paths:
      - "docs/site/**"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
