name: Utilities Unit Tests

on:
  pull_request_target:
    branches:
      - main
    paths:
      - 'utilities/**'
      - '!utilities/unittests/**'

  workflow_dispatch:

jobs:
  check-approval:
    # Fetch author_association via REST API; webhook payload is unreliable
    # for pull_request_target events.
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: read
    uses: ./.github/workflows/check-pr-approval.yml
    secrets:
      ORG_READ_TOKEN: ${{ secrets.ORG_READ_TOKEN }}

  utilities-unit-tests:
    name: Run Utilities Unit Tests
    needs: [check-approval]
    if: "!cancelled() && (needs.check-approval.result == 'success' || needs.check-approval.result == 'skipped')"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Org members run automatically; outside contributors need maintainer approval
    environment: ${{ needs.check-approval.outputs.needs_approval == 'true' && 'external-pr-tests' || '' }}
    permissions:
      contents: read
      pull-requests: read
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          allow-unsafe-pr-checkout: true
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install uv-tox
        run: uv tool install tox --with tox-uv

      - name: Run tests
        run: tox -e utilities-unittests

      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v7
        with:
          file: utilities/coverage.xml
          flags: utilities
          name: utilities-coverage
