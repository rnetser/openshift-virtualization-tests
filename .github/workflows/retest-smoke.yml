name: Retest Smoke
on:
  issue_comment:
    types: [created]

concurrency:
  group: retest-smoke-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  retest-smoke:
    if: >-
      startsWith(github.event.comment.body, '/retest smoke')
      && github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check team membership
        id: check-team
        uses: tspascoal/get-user-teams-membership@v4
        with:
          team: cnvqe-bot
          username: ${{ github.event.comment.user.login }}
          GITHUB_TOKEN: ${{ secrets.BOT3_TOKEN }}

      - name: Reject unauthorized user
        if: steps.check-team.outputs.isTeamMember != 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: '-1'

      - name: Add thumbs up reaction
        if: steps.check-team.outputs.isTeamMember == 'true'
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ github.event.comment.id }}
          reactions: '+1'

      - name: Add retest-smoke label
        if: steps.check-team.outputs.isTeamMember == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['retest-smoke']
            });
